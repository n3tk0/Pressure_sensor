name: Build Windows EXE

on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
    paths:
      - 'sensor_app.py'
      - 'sensor_app.spec'
      - 'fonts/**'
      - 'icon.ico'
      - '.github/workflows/build-exe.yml'
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

permissions:
  contents: write   # needed to push the rebuilt EXE back to the branch

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller dearpygui pyserial

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller sensor_app.spec --clean --noconfirm

      - name: Verify EXE was created
        run: |
          if (Test-Path "dist\sensor_app.exe") {
            $size = (Get-Item "dist\sensor_app.exe").length / 1MB
            Write-Host "sensor_app.exe built successfully ($([math]::Round($size,1)) MB)"
          } else {
            Write-Error "Build failed — sensor_app.exe not found"
            exit 1
          }

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sensor_app-windows
          path: dist/sensor_app.exe
          retention-days: 30
